name: medicare_plus
description: TrustMeds health, pharmacy, diagnostics, and consultation app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_remote_config: ^6.4.0

  # State Management
  get: ^4.6.6

  # UI
  google_fonts: ^8.0.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^2.0.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  fluttertoast: ^9.0.0

  # Media
  image_picker: ^1.0.7
  file_picker: ^11.0.2

  # Payment
  razorpay_flutter: ^1.3.6

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Networking
  dio: ^5.4.1
  connectivity_plus: ^7.1.1

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.5
  permission_handler: ^12.0.1
  path_provider: ^2.1.3
  uuid: ^4.4.0
  pinput: ^6.0.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
